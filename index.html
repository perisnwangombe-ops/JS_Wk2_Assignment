<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calorie Counter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="min-h-screen">
  <div class="max-w-2xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-8 text-emerald-400">🍎 Calorie Counter</h1>

    <!-- Add Food Form -->
    <div class="bg-zinc-500 rounded-2xl p-6 mb-8">
      <form id="food-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <input type="text" id="food-name" placeholder="Food name (e.g. Chicken Breast)" 
               class="bg-zinc-600 border border-zinc-600 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500" required/>

        <input type="number" id="calories" placeholder="Calories" min="1"
               class="bg-zinc-600 border border-zinc-600 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500" required/>

        <button type="submit"
                class="bg-emerald-500 hover:bg-emerald-600 transition-colors font-semibold rounded-xl px-6 py-3 flex items-center justify-center gap-2">
                + Add Food
        </button>
      </form>
    </div>

    <!-- Total Calories -->
    <div class="bg-zinc-500 rounded-2xl p-6 mb-8 text-center">
      <p class="text-zinc-400 text-sm">Total Calories Today</p>
      <p id="total-calories" class="text-6xl font-bold text-emerald-400 mt-2">0</p>
    </div>

    <!-- Food List -->
    <div class="bg-zinc-500 rounded-2xl p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Today's Intake</h2>
        <button id="reset-btn"
                class="text-red-400 hover:text-red-500 flex items-center gap-2 text-sm font-medium">
           Reset Day
        </button>
      </div>

      <ul id="food-list" class="space-y-3 min-h-[200px]"></ul>

      <p id="empty-state" class="text-center text-zinc-500 py-8 hidden">
        No food added yet. Start tracking your calories!
      </p>
    </div>

    <div class="text-center mt-8 text-xs text-zinc-500">
      Data is saved automatically • Built with Tailwind + Vanilla JS
    </div>
  </div>

  <script src="script.js"></script>
  
</body>
</html>
